    }

    /* ===== LAYOUT ===== */
    #app {

      flex: 1;
      overflow: hidden;
    }

    /* ===== SIDE PANEL ===== */
    #sidebar {
      width: 340px;
      min-width: 280px;
      display: flex;
      flex-direction: column;
      background: #fff;
      border-right: 1px solid #e2e8f0;
      overflow: hidden;
      z-index: 10;
    }

    #sidebar-header {
      background: #1a56db;
      color: #fff;
      padding: 18px 16px 14px;
      flex-shrink: 0;
    }

    #sidebar-header h1 {
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.4;
      letter-spacing: 0.02em;
    }

    #sidebar-header p {
      font-size: 0.75rem;
      opacity: 0.85;
      margin-top: 4px;
    }

    /* legend */
    #legend {
      display: flex;
      gap: 14px;
      padding: 10px 16px;
      background: #f1f5f9;
      border-bottom: 1px solid #e2e8f0;
      flex-shrink: 0;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: #475569;
    }

    .legend-dot {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      flex-shrink: 0;
      color: #fff;
      font-weight: bold;
    }

    .legend-dot.confirmed { background: #1a56db; }
    .legend-dot.check    { background: #d97706; }

    /* filters */
    #filters {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      border-bottom: 1px solid #e2e8f0;
      flex-shrink: 0;
    }

    .filter-btn {
      flex: 1;
      padding: 6px 4px;
      font-size: 0.75rem;
      border: 1.5px solid #cbd5e1;
      border-radius: 6px;
      background: #fff;
      color: #475569;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
      font-weight: 500;
    }

    .filter-btn:hover { border-color: #1a56db; color: #1a56db; }

    .filter-btn.active {
      background: #1a56db;
      border-color: #1a56db;
      color: #fff;
    }

    /* hotel count */
    #hotel-count {
      font-size: 0.72rem;
      color: #94a3b8;
      padding: 6px 16px 4px;
      flex-shrink: 0;
    }

    /* hotel list */
    #hotel-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 10px 16px;
    }

    #hotel-list::-webkit-scrollbar { width: 5px; }
    #hotel-list::-webkit-scrollbar-track { background: transparent; }
    #hotel-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }

    /* hotel card */
    .hotel-card {
      background: #fff;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      margin-bottom: 8px;
      overflow: hidden;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .hotel-card:hover { border-color: #93c5fd; box-shadow: 0 2px 8px rgba(26,86,219,0.1); }

    .hotel-card.active {
      border-color: #1a56db;
      box-shadow: 0 0 0 2px rgba(26,86,219,0.2);
    }

    .hotel-card-header {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 10px 12px 8px;
      cursor: pointer;
    }

    .card-marker {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
      flex-shrink: 0;
      margin-top: 1px;
      color: #fff;
    }

    .card-marker.confirmed { background: #1a56db; }
    .card-marker.check     { background: #d97706; }

    .card-info { flex: 1; min-width: 0; }

    .card-name {
      font-size: 0.85rem;
      font-weight: 700;
      line-height: 1.35;
      color: #1e293b;
    }

    .card-room {
      font-size: 0.72rem;
      color: #64748b;
      margin-top: 2px;
    }

    .card-access {
      font-size: 0.7rem;
      color: #94a3b8;
      margin-top: 2px;
    }

    .card-badge {
      font-size: 0.65rem;
      padding: 2px 7px;
      border-radius: 99px;
      font-weight: 600;
      flex-shrink: 0;
      margin-top: 2px;
      white-space: nowrap;
    }

    .card-badge.confirmed { background: #dbeafe; color: #1a56db; }
    .card-badge.check     { background: #fef3c7; color: #92400e; }

    /* expand toggle */
    .card-footer {
      padding: 0 12px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .toggle-btn {
      font-size: 0.72rem;
      color: #1a56db;
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 0;
      display: flex;
      align-items: center;
      gap: 4px;
      font-family: inherit;
    }

    .toggle-btn::after {
      content: "▼";
      font-size: 0.6rem;
      transition: transform 0.2s;
    }

    .toggle-btn.open::after { transform: rotate(180deg); }

    .card-site-link {
      font-size: 0.7rem;
      color: #64748b;
      text-decoration: none;
    }

    .card-site-link:hover { color: #1a56db; text-decoration: underline; }

    /* bf detail */
    .bf-detail {
      display: none;
      padding: 0 12px 10px 48px;
    }

    .bf-detail.open { display: block; }

    .bf-detail ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .bf-detail li {
      font-size: 0.72rem;
      color: #475569;
      display: flex;
      align-items: flex-start;
      gap: 4px;
      line-height: 1.4;
    }

    .bf-detail li::before { content: "♿"; font-size: 0.7rem; flex-shrink: 0; }

    /* ===== MAP ===== */
    #map { flex: 1; }

    /* ===== INFO WINDOW ===== */
    .iw-wrap { font-family: inherit; max-width: 300px; }

    .iw-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 2px;
      line-height: 1.35;
    }

    .iw-room {
      font-size: 0.75rem;
      color: #64748b;
      margin-bottom: 6px;
    }

    .iw-badge {
      display: inline-block;
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 99px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .iw-badge.confirmed { background: #dbeafe; color: #1a56db; }
    .iw-badge.check     { background: #fef3c7; color: #92400e; }

    .iw-warn {
      font-size: 0.72rem;
      color: #92400e;
      background: #fef3c7;
      border: 1px solid #fcd34d;
      border-radius: 6px;
      padding: 6px 8px;
      margin-bottom: 8px;
      line-height: 1.45;
    }

    .iw-section-label {
      font-size: 0.7rem;
      color: #94a3b8;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 3px;
    }

    .iw-access {
      font-size: 0.78rem;
      color: #475569;
      margin-bottom: 8px;
    }

    .iw-bf-list {
      list-style: none;
      margin-bottom: 10px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .iw-bf-list li {
      font-size: 0.75rem;
      color: #475569;
      display: flex;
      align-items: flex-start;
      gap: 4px;
      line-height: 1.4;
    }

    .iw-bf-list li span { flex: 1; }

    .iw-actions {
      display: flex;
      gap: 8px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    .iw-actions a {
      font-size: 0.75rem;
      padding: 5px 12px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;

      background: #f1f5f9;
      color: #1e293b;
      border: 1px solid #e2e8f0;
    }

    .iw-tel:hover { background: #e2e8f0; }

      background: #1a56db;
      color: #fff;
    }

        height: 45dvh;
        border-right: none;
        border-bottom: 1px solid #e2e8f0;
      }

      #map { height: 55dvh; }

      #sidebar-header h1 { font-size: 0.95rem; }
    }

// ================================================================
// State
// ================================================================
let map;
let markers = {};       // id -> google.maps.Marker
let infoWindow;
let activeCardId = null;
let currentFilter = "all";

// ================================================================
// Map init (called by Google Maps API callback)
// ================================================================
function initMap() {
  map = new google.maps.Map(document.getElementById("map"), {
    center: { lat: 38.2596, lng: 140.8826 },
    zoom: 16,
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: true,
    zoomControlOptions: { position: google.maps.ControlPosition.RIGHT_CENTER }
  });

  infoWindow = new google.maps.InfoWindow({ maxWidth: 320 });

  HOTELS.forEach(hotel => {
    const marker = new google.maps.Marker({
      position: { lat: hotel.lat, lng: hotel.lng },
      map,
      title: hotel.name
    });

    marker.addListener("click", () => openInfo(hotel, marker));
    markers[hotel.id] = marker;
  });

  // buildList(HOTELS);
  // updateCount(HOTELS.length);
}

// ================================================================
// Info Window
// ================================================================
function openInfo(hotel, marker) {
  infoWindow.setContent(`<div style="font-size:0.9rem;font-weight:700;padding:2px 4px;">${hotel.name}</div>`);
  infoWindow.open(map, marker);
  // setActiveCard(hotel.id);
}

// ================================================================
// Sidebar list
// ================================================================
function buildList(hotels) {
  const list = document.getElementById("hotel-list");
  list.innerHTML = "";

  if (hotels.length === 0) {
    list.innerHTML = `<div style="text-align:center;color:#94a3b8;padding:32px 16px;font-size:0.85rem;">
      該当するホテルがありません
    </div>`;
    return;
  }

  hotels.forEach(hotel => {
    const isConfirmed = hotel.status === "confirmed";
    const statusClass = isConfirmed ? "confirmed" : "check";
    const badgeLabel  = isConfirmed ? "✅ 確認済み" : "❓ 要確認";
    const markerEmoji = isConfirmed ? "♿" : "❓";

    const bfHtml = hotel.barrierFree
      .map(b => `<li>${b}</li>`)
      .join("");

    const card = document.createElement("div");
    card.className = "hotel-card";
    card.dataset.id = hotel.id;

    card.innerHTML = `
      <div class="hotel-card-header">
        <div class="card-marker ${statusClass}">${markerEmoji}</div>
        <div class="card-info">
          <div class="card-name">${hotel.name}</div>
          <div class="card-room">${hotel.roomName}</div>
          <div class="card-access">${hotel.access}</div>
        </div>
        <span class="card-badge ${statusClass}">${badgeLabel}</span>
      </div>
      <div class="card-footer">
        <button class="toggle-btn" data-id="${hotel.id}">バリアフリー設備を見る</button>
        <a class="card-site-link" href="${hotel.url}" target="_blank" rel="noopener">公式サイト ↗</a>
      </div>
      <div class="bf-detail" id="bf-${hotel.id}">
        <ul>${bfHtml}</ul>
      </div>
    `;

    // click header -> map
    card.querySelector(".hotel-card-header").addEventListener("click", () => {
      const marker = markers[hotel.id];
      map.panTo(marker.getPosition());
      if (map.getZoom() < 15) map.setZoom(15);
      openInfo(hotel, marker);
      // scroll card into view on mobile
      card.scrollIntoView({ behavior: "smooth", block: "nearest" });
    });

    // toggle bf detail
    card.querySelector(".toggle-btn").addEventListener("click", e => {
      e.stopPropagation();
      const detail = document.getElementById(`bf-${hotel.id}`);
      const btn    = e.currentTarget;
      const isOpen = detail.classList.toggle("open");
      btn.classList.toggle("open", isOpen);
      btn.textContent = isOpen ? "バリアフリー設備を閉じる" : "バリアフリー設備を見る";
      if (isOpen) btn.classList.add("open"); else btn.classList.remove("open");
    });

    list.appendChild(card);
  });
}

function setActiveCard(id) {
  if (activeCardId) {
    const prev = document.querySelector(`.hotel-card[data-id="${activeCardId}"]`);
    if (prev) prev.classList.remove("active");
  }
  activeCardId = id;
  const curr = document.querySelector(`.hotel-card[data-id="${id}"]`);
  if (curr) {
    curr.classList.add("active");
    curr.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }
}

function updateCount(n) {
  document.getElementById("hotel-count").textContent = `${n} 件表示中`;
}

// ================================================================
// Filters
// ================================================================
document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentFilter = btn.dataset.filter;
    applyFilter();
  });
});

function applyFilter() {
  const filtered = currentFilter === "all"
    ? HOTELS
    : HOTELS.filter(h => h.status === currentFilter);

  // update markers visibility
  HOTELS.forEach(h => {
    const show = filtered.some(f => f.id === h.id);
    markers[h.id] && markers[h.id].setVisible(show);
  });

  buildList(filtered);
  updateCount(filtered.length);

  // close info window if active hotel is filtered out
  if (activeCardId && !filtered.some(h => h.id === activeCardId)) {
    infoWindow.close();
    activeCardId = null;
  }
}
